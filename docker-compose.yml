services:
  # PostgreSQL 16（核心）
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"  # Windows端口映射
    environment:
      POSTGRES_PASSWORD: 123456  # 密码
      POSTGRES_USER: postgres    # 用户名
      POSTGRES_DB: py_backend    # 初始化数据库
      TZ: Asia/Shanghai          # 时区适配Windows
    volumes:
      - postgres-data:/var/lib/postgresql/data  # 数据持久化
    restart: always
    networks:
      - py_backend_net

  # Redis（缓存）
  redis:
    image: redis:7.0
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always
    networks:
      - py_backend_net

networks:
  py_backend_net:

volumes:
  postgres-data:
  redis-data: